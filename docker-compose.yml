services:

  mysql:
    image: mysql:8.0
    container_name: sgf_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sgf_db
      MYSQL_USER: sgf_user
      MYSQL_PASSWORD: sgf_pass
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - sgf_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "sgf_user", "-psgf_pass"]
      interval: 5s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: sgf_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - mysql
    networks:
      - sgf_network

  backend:
    build: ./backend
    image: sgf-backend
    container_name: sgf_backend
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/sgf_db
      SPRING_DATASOURCE_USERNAME: sgf_user
      SPRING_DATASOURCE_PASSWORD: sgf_pass
      MERCADOPAGO_ACCESS_TOKEN: TEST-2095943962507364-032619-668060ef9d2c7d8767ab2fed78773a05-2905125544
    networks:
      - sgf_network

  frontend:
    build: ./frontend
    image: sgf-frontend
    container_name: sgf_frontend
    ports:
      - "4200:4200"
    depends_on:
      - backend
    networks:
      - sgf_network

volumes:
  mysql_data:

networks:
  sgf_network: