<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">{{ isEditing ? 'Edit client' : 'New client' }}</h1>
      <p class="page-subtitle">{{ isEditing ? 'Update the client data' : 'Fill in the data to register a client' }}</p>
    </div>
    <a routerLink="/clients" class="btn btn-secondary">
      <i class="ti ti-arrow-left"></i>
      Back
    </a>
  </div>

  <div class="form-card">
    <form [formGroup]="form" (ngSubmit)="submit()">

      <div class="section-title">Main data</div>
      <div class="form-grid">

        <div class="form-group full">
          <label for="name">Name / Legal name</label>
          <input id="name" type="text" formControlName="name"
            placeholder="Ex: Alpha Company LLC" [class.invalid]="isInvalid('name')" />
          <span class="field-error" *ngIf="isInvalid('name')">Name is required</span>
        </div>

        <div class="form-group">
          <label for="type">Type</label>
          <select id="type" formControlName="type" [class.invalid]="isInvalid('type')">
            <option value="">Select</option>
            <option value="PERSON">Individual</option>
            <option value="COMPANY">Company</option>
          </select>
          <span class="field-error" *ngIf="isInvalid('type')">Type is required</span>
        </div>

        <div class="form-group">
          <label for="document">{{ form.get('type')?.value === 'PERSON' ? 'CPF' : 'CNPJ' }}</label>
          <input id="document" type="text" formControlName="document"
            [cpfCnpjMask]="form.get('type')?.value"
            [placeholder]="form.get('type')?.value === 'PERSON' ? '000.000.000-00' : '00.000.000/0000-00'"
            [class.invalid]="isInvalid('document')" />
          <span class="field-error" *ngIf="isInvalid('document')">Document is required</span>
        </div>

        <div class="form-group">
          <label for="email">E-mail</label>
          <input id="email" type="email" formControlName="email"
            placeholder="contato@empresa.com" [class.invalid]="isInvalid('email')" />
          <span class="field-error" *ngIf="isInvalid('email')">Invalid e-mail</span>
        </div>

        <div class="form-group">
          <label for="phone">Phone</label>
          <input id="phone" type="text" formControlName="phone"
            phoneMask placeholder="(11) 99999-9999" [class.invalid]="isInvalid('phone')" />
          <span class="field-error" *ngIf="isInvalid('phone')">Phone is required</span>
        </div>

      </div>

      <div class="section-title">Address <span class="optional">(optional)</span></div>
      <div class="form-grid">

        <div class="form-group">
          <label for="addressPostalCode">Postal code</label>
          <input id="addressPostalCode" type="text" formControlName="addressPostalCode"
            cepMask placeholder="00000-000" />
        </div>

        <div class="form-group">
          <label for="addressStreet">Street</label>
          <input id="addressStreet" type="text" formControlName="addressStreet" placeholder="Ex: Main Street" />
        </div>

        <div class="form-group">
          <label for="addressNumber">Number</label>
          <input id="addressNumber" type="text" formControlName="addressNumber" placeholder="Ex: 123" />
        </div>

        <div class="form-group">
          <label for="addressNeighborhood">Neighborhood</label>
          <input id="addressNeighborhood" type="text" formControlName="addressNeighborhood" placeholder="Ex: Downtown" />
        </div>

        <div class="form-group">
          <label for="addressCity">City</label>
          <input id="addressCity" type="text" formControlName="addressCity" placeholder="Ex: Sao Paulo" />
        </div>

        <div class="form-group">
          <label for="addressState">State</label>
          <input id="addressState" type="text" formControlName="addressState" placeholder="Ex: SP" maxlength="2" />
        </div>

        <div class="form-group">
          <label for="addressCountry">Country</label>
          <input id="addressCountry" type="text" formControlName="addressCountry" placeholder="Ex: Brazil" />
        </div>

      </div>

      <div class="global-error" *ngIf="errorMessage">
        <i class="ti ti-alert-circle"></i>
        {{ errorMessage }}
      </div>

      <div class="form-footer">
        <a routerLink="/clients" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary" [disabled]="loading">
          <i class="ti" [ngClass]="loading ? 'ti-loader' : (isEditing ? 'ti-check' : 'ti-plus')"></i>
          {{ loading ? 'Saving...' : (isEditing ? 'Save changes' : 'Register client') }}
        </button>
      </div>

    </form>
  </div>
</div>
