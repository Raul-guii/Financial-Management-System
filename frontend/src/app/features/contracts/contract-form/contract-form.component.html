<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">{{ isEditing ? 'Editar contrato' : 'Novo contrato' }}</h1>
      <p class="page-subtitle">{{ isEditing ? 'Atualize os dados do contrato' : 'Preencha os dados para criar um contrato' }}</p>
    </div>
    <a routerLink="/contracts" class="btn btn-secondary">
      <i class="ti ti-arrow-left"></i>
      Voltar
    </a>
  </div>

  <div class="form-card">
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-grid">

        <div class="form-group full" *ngIf="!isEditing">
          <label for="clientId">Cliente</label>
          <select id="clientId" formControlName="clientId" [class.invalid]="isInvalid('clientId')">
            <option value="">Selecione um cliente</option>
            <option *ngFor="let client of clients" [value]="client.id">
              {{ client.name }}
            </option>
          </select>
          <span class="field-error" *ngIf="isInvalid('clientId')">Cliente é obrigatório</span>
        </div>

        <div class="form-group">
          <label for="billingPeriod">Período de faturamento</label>
          <select id="billingPeriod" formControlName="billingPeriod" [class.invalid]="isInvalid('billingPeriod')">
            <option value="">Selecione</option>
            <option value="MONTHLY">Mensal</option>
            <option value="QUARTERLY">Trimestral</option>
            <option value="SEMIANNUAL">Semestral</option>
            <option value="ANNUAL">Anual</option>
          </select>
          <span class="field-error" *ngIf="isInvalid('billingPeriod')">Período é obrigatório</span>
        </div>

        <div class="form-group">
          <label for="startDate">Data de início</label>
          <input
            id="startDate"
            type="date"
            formControlName="startDate"
            [class.invalid]="isInvalid('startDate')"
          />
          <span class="field-error" *ngIf="isInvalid('startDate')">Data de início é obrigatória</span>
        </div>

        <div class="form-group">
          <label for="endDate">Data de fim</label>
          <input
            id="endDate"
            type="date"
            formControlName="endDate"
            [class.invalid]="isInvalid('endDate')"
          />
          <span class="field-error" *ngIf="isInvalid('endDate')">Data de fim é obrigatória</span>
        </div>

      </div>

      <div class="global-error" *ngIf="errorMessage">
        <i class="ti ti-alert-circle"></i>
        {{ errorMessage }}
      </div>

      <div class="form-footer">
        <a routerLink="/contracts" class="btn btn-secondary">Cancelar</a>
        <button type="submit" class="btn btn-primary" [disabled]="loading">
          <i class="ti" [ngClass]="loading ? 'ti-loader' : (isEditing ? 'ti-check' : 'ti-plus')"></i>
          {{ loading ? 'Salvando...' : (isEditing ? 'Salvar alterações' : 'Criar contrato') }}
        </button>
      </div>

    </form>
  </div>
</div>
