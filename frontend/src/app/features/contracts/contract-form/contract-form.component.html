<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">{{ isEditing ? 'Edit contract' : 'New contract' }}</h1>
      <p class="page-subtitle">{{ isEditing ? 'Update the contract data' : 'Fill in the data to create a contract' }}</p>
    </div>
    <a routerLink="/contracts" class="btn btn-secondary">
      <i class="ti ti-arrow-left"></i>
      Back
    </a>
  </div>

  <div class="form-card">
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-grid">

        <div class="form-group full" *ngIf="!isEditing">
          <label for="clientId">Client</label>
          <select id="clientId" formControlName="clientId" [class.invalid]="isInvalid('clientId')">
            <option value="">Select a client</option>
            <option *ngFor="let client of clients" [value]="client.id">
              {{ client.name }}
            </option>
          </select>
          <span class="field-error" *ngIf="isInvalid('clientId')">Client is required</span>
        </div>

        <div class="form-group">
          <label for="billingPeriod">Billing period</label>
          <select id="billingPeriod" formControlName="billingPeriod" [class.invalid]="isInvalid('billingPeriod')">
            <option value="">Select</option>
            <option value="MONTHLY">Monthly</option>
            <option value="QUARTERLY">Quarterly</option>
            <option value="SEMIANNUAL">Semiannual</option>
            <option value="ANNUAL">Annual</option>
          </select>
          <span class="field-error" *ngIf="isInvalid('billingPeriod')">Period is required</span>
        </div>

        <div class="form-group">
          <label for="startDate">Start date</label>
          <input
            id="startDate"
            type="date"
            formControlName="startDate"
            [class.invalid]="isInvalid('startDate')"
          />
          <span class="field-error" *ngIf="isInvalid('startDate')">Start date is required</span>
        </div>

        <div class="form-group">
          <label for="endDate">End date</label>
          <input
            id="endDate"
            type="date"
            formControlName="endDate"
            [class.invalid]="isInvalid('endDate')"
          />
          <span class="field-error" *ngIf="isInvalid('endDate')">End date is required</span>
        </div>

      </div>

      <div class="global-error" *ngIf="errorMessage">
        <i class="ti ti-alert-circle"></i>
        {{ errorMessage }}
      </div>

      <div class="form-footer">
        <a routerLink="/contracts" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary" [disabled]="loading">
          <i class="ti" [ngClass]="loading ? 'ti-loader' : (isEditing ? 'ti-check' : 'ti-plus')"></i>
          {{ loading ? 'Saving...' : (isEditing ? 'Save changes' : 'Create contract') }}
        </button>
      </div>

    </form>
  </div>
</div>
