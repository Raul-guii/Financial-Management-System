<p>DEBUG LENGTH: {{ items.length }}</p>

<div *ngFor="let item of items">
  {{ item.name }}
</div>

<table *ngIf="items && items.length > 0; else empty">
  <thead>
    <tr>
      <th>ID</th>
      <th>Nome</th>
      <th>Descrição</th>
      <th>Qtd</th>
      <th>Preço</th>
      <th>Total</th>
      <th>Ativo</th>
      <th>Ações</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let item of items">
      <td>{{ item.id }}</td>
      <td>{{ item.name }}</td>
      <td>{{ item.description }}</td>
      <td>{{ item.quantity }}</td>
      <td>{{ item.unitPrice }}</td>
      <td>{{ item.quantity * item.unitPrice }}</td>
      <td>{{ item.active ? 'Sim' : 'Não' }}</td>

      <td>
        <button (click)="deactivate(item.id)">Desativar</button>
      </td>
    </tr>
  </tbody>
</table>

<ng-template #empty>
  <p>Nenhum item encontrado</p>
</ng-template>
