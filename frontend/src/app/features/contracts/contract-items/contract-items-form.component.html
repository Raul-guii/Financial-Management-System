<h2>Itens do Contrato</h2>

<form [formGroup]="form" (ngSubmit)="submit()">
  <input placeholder="Nome do item" formControlName="name">
  <input placeholder="Descrição" formControlName="description">
  <input placeholder="Quantidade" type="number" formControlName="quantity">
  <input placeholder="Preço unitário" type="number" formControlName="unitPrice">

  <label>
    <input type="checkbox" formControlName="active">
    Ativo
  </label>

<button 
  type="button" 
  class="next"
  [disabled]="items.length === 0 && form.invalid"
  (click)="finish()">
  Criar Invoice →
</button>

<p *ngIf="error" class="error">{{ error }}</p>

<hr>

<div *ngIf="items.length > 0">
  <h3>Itens cadastrados</h3>
  <ul>
    <li *ngFor="let item of items">
      {{ item.name }} - {{ item.quantity }} x {{ item.unitPrice }}
    </li>
  </ul>
</div>
