<div class="login-container">
  <!-- Painel esquerdo - azul com logo -->
  <div class="left-panel">
    <div class="logo-placeholder">
      <!-- Coloque sua logo aqui -->
      <img src="android-chrome-192x192.png" alt="Logo do sistema">
    </div>
    <div class="brand-text">
      <h1>Sistema de Gestão Financeira</h1>
      <p>Controle completo de contratos, faturas e pagamentos recorrentes</p>
    </div>
  </div>

  <!-- Painel direito - formulário branco -->
  <div class="right-panel">
    <div class="login-form">
      <div class="form-header">
        <h2>Bem-vindo</h2>
        <p>Entre com suas credenciais para acessar o sistema</p>
      </div>

      <form (ngSubmit)="login()">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input 
            type="email" 
            id="email"
            [(ngModel)]="email" 
            name="email" 
            placeholder="seu@email.com"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input 
            type="password" 
            id="password"
            [(ngModel)]="password" 
            name="password" 
            placeholder="••••••••"
            required
          />
        </div>

        <button type="submit" class="btn-login" [disabled]="loading">
          <span *ngIf="!loading">Entrar</span>
          <span *ngIf="loading" class="btn-spinner"></span>
        </button>

        <div class="error-message" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <div class="forgot-password">
          <a href="#">Esqueceu sua senha?</a>
        </div>
      </form>
    </div>
  </div>
</div>
