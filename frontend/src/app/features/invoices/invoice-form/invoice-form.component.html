<form [formGroup]="form" (ngSubmit)="submit()">

  <label>Issue Date</label>
  <input type="date" formControlName="issueDate" />

  <label>Due Date</label>
  <input type="date" formControlName="dueDay" />

  <label>Late Fee</label>
  <input type="number" formControlName="lateFreeAmount" />

  <label>Interest</label>
  <input type="number" step="0.01" formControlName="interestAmount" />

  <button type="submit">Criar Invoice</button>

</form>
