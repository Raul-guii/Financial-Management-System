<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">{{ isEditing ? 'Editar fatura' : 'Nova fatura' }}</h1>
      <p class="page-subtitle">{{ isEditing ? 'Atualize os dados da fatura' : 'Preencha os dados para gerar a fatura' }}</p>
    </div>
    <a routerLink="/invoices" class="btn btn-secondary">
      <i class="ti ti-arrow-left"></i>
      Voltar
    </a>
  </div>

  <!-- STEP INDICATOR (só na criação) -->
  <div class="step-bar" *ngIf="!isEditing">
    <div class="step done">
      <div class="step-num"><i class="ti ti-check"></i></div>
      <span>Contrato</span>
    </div>
    <div class="step-line"></div>
    <div class="step done">
      <div class="step-num"><i class="ti ti-check"></i></div>
      <span>Itens</span>
    </div>
    <div class="step-line"></div>
    <div class="step active">
      <div class="step-num">3</div>
      <span>Fatura</span>
    </div>
  </div>

  <div class="form-card">
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-grid">

        <div class="form-group full" *ngIf="!isEditing && !contractIdFromRoute">
          <label for="contractId">Contrato</label>
          <select id="contractId" formControlName="contractId" [class.invalid]="isInvalid('contractId')">
            <option value="">Selecione um contrato</option>
            <option *ngFor="let c of contracts" [value]="c.id">
              #{{ c.id }} — {{ getClientName(c.clientId) }}
            </option>
          </select>
          <span class="field-error" *ngIf="isInvalid('contractId')">Contrato é obrigatório</span>
        </div>

        <!-- Contrato pré-selecionado (vindo do fluxo) -->
        <div class="form-group full" *ngIf="contractIdFromRoute">
          <label>Contrato</label>
          <div class="readonly-field">
            <i class="ti ti-file-text"></i>
            Contrato #{{ contractIdFromRoute }}
          </div>
        </div>

        <div class="form-group">
          <label for="issueDate">Data de emissão</label>
          <input
            id="issueDate"
            type="date"
            formControlName="issueDate"
            [class.invalid]="isInvalid('issueDate')"
          />
          <span class="field-error" *ngIf="isInvalid('issueDate')">Data de emissão é obrigatória</span>
        </div>

        <div class="form-group">
          <label for="dueDate">Data de vencimento <span class="optional">(opcional)</span></label>
          <input
            id="dueDate"
            type="date"
            formControlName="dueDate"
          />
        </div>

      </div>

      <div class="global-error" *ngIf="errorMessage">
        <i class="ti ti-alert-circle"></i>
        {{ errorMessage }}
      </div>

      <div class="form-footer">
        <a routerLink="/invoices" class="btn btn-secondary">Cancelar</a>
        <button type="submit" class="btn btn-primary" [disabled]="loading">
          <i class="ti" [ngClass]="loading ? 'ti-loader' : (isEditing ? 'ti-check' : 'ti-plus')"></i>
          {{ loading ? 'Salvando...' : (isEditing ? 'Salvar alterações' : 'Gerar fatura') }}
        </button>
      </div>

    </form>
  </div>
</div>
