<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">{{ isEditing ? 'Edit invoice' : 'New invoice' }}</h1>
      <p class="page-subtitle">{{ isEditing ? 'Update the invoice data' : 'Fill in the data to generate the invoice' }}</p>
    </div>
    <a routerLink="/invoices" class="btn btn-secondary">
      <i class="ti ti-arrow-left"></i>
      Back
    </a>
  </div>

  <!-- STEP INDICATOR (creation only) -->
  <div class="step-bar" *ngIf="!isEditing">
    <div class="step done">
      <div class="step-num"><i class="ti ti-check"></i></div>
      <span>Contract</span>
    </div>
    <div class="step-line"></div>
    <div class="step done">
      <div class="step-num"><i class="ti ti-check"></i></div>
      <span>Items</span>
    </div>
    <div class="step-line"></div>
    <div class="step active">
      <div class="step-num">3</div>
      <span>Invoice</span>
    </div>
  </div>

  <div class="form-card">
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-grid">

        <div class="form-group full" *ngIf="!isEditing && !contractIdFromRoute">
          <label for="contractId">Contract</label>
          <select id="contractId" formControlName="contractId" [class.invalid]="isInvalid('contractId')">
            <option value="">Select a contract</option>
            <option *ngFor="let c of contracts" [value]="c.id">
              #{{ c.id }} — {{ getClientName(c.clientId) }}
            </option>
          </select>
          <span class="field-error" *ngIf="isInvalid('contractId')">Contract is required</span>
        </div>

        <!-- Preselected contract (from the flow) -->
        <div class="form-group full" *ngIf="contractIdFromRoute">
          <label>Contract</label>
          <div class="readonly-field">
            <i class="ti ti-file-text"></i>
            Contract #{{ contractIdFromRoute }}
          </div>
        </div>

        <div class="form-group">
          <label for="issueDate">Issue date</label>
          <input
            id="issueDate"
            type="date"
            formControlName="issueDate"
            [class.invalid]="isInvalid('issueDate')"
          />
          <span class="field-error" *ngIf="isInvalid('issueDate')">Issue date is required</span>
        </div>

        <div class="form-group">
          <label for="dueDate">Due date</label>
          <input
            id="dueDate"
            type="date"
            formControlName="dueDate"
          />
        </div>

      </div>

      <div class="global-error" *ngIf="errorMessage">
        <i class="ti ti-alert-circle"></i>
        {{ errorMessage }}
      </div>

      <div class="form-footer">
        <a routerLink="/invoices" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary" [disabled]="loading">
          <i class="ti" [ngClass]="loading ? 'ti-loader' : (isEditing ? 'ti-check' : 'ti-plus')"></i>
          {{ loading ? 'Saving...' : (isEditing ? 'Save changes' : 'Generate invoice') }}
        </button>
      </div>

    </form>
  </div>
</div>
