<div class="header">
  <h2>Usuários</h2>

  <button class="new" routerLink="/users/new">
    + Novo Usuário
  </button>
</div>

<table *ngIf="users.length > 0; else empty">
  <thead>
    <tr>
      <th>ID</th>
      <th>Nome</th>
      <th>Email</th>
      <th>Perfil</th>
      <th>Ações</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let user of users">
      <td>{{ user.id }}</td>
      <td>{{ user.name }}</td>
      <td>{{ user.email }}</td>

      <!-- ROLE COM ESTILO -->
      <td>
        <span class="role" [ngClass]="user.role.toLowerCase()">
          {{ user.role }}
        </span>
      </td>

      <!-- AÇÕES -->
      <td class="actions">

        <button class="delete" (click)="delete(user.id)">
          Excluir
        </button>
        <button class="edit" [routerLink]="['/users/edit', user.id]">
          Editar
        </button>
      </td>
    </tr>
  </tbody>
</table>

<!-- ESTADO VAZIO -->
<ng-template #empty>
  <p class="empty">Nenhum usuário encontrado</p>
</ng-template>
