<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">{{ isEditing ? 'Edit user' : 'New user' }}</h1>
      <p class="page-subtitle">{{ isEditing ? 'Update the user data' : 'Fill in the data to create a user' }}</p>
    </div>
    <a routerLink="/users" class="btn btn-secondary">
      <i class="ti ti-arrow-left"></i>
      Back
    </a>
  </div>

  <div class="form-card">
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-grid">

        <div class="form-group">
          <label for="name">Full name</label>
          <input
            id="name"
            type="text"
            formControlName="name"
            placeholder="Ex: Carlos Mendes"
            [class.invalid]="isInvalid('name')"
          />
          <span class="field-error" *ngIf="isInvalid('name')">Name is required</span>
        </div>

        <div class="form-group">
          <label for="email">E-mail</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="usuario@empresa.com"
            [class.invalid]="isInvalid('email')"
          />
          <span class="field-error" *ngIf="isInvalid('email')">Invalid e-mail</span>
        </div>

        <div class="form-group" *ngIf="!isEditing">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="Minimum 8 characters"
              [class.invalid]="isInvalid('password')"
            />
            <button type="button" class="toggle-pwd" (click)="showPassword = !showPassword">
              <i class="ti" [ngClass]="showPassword ? 'ti-eye-off' : 'ti-eye'"></i>
            </button>
          </div>
          <span class="field-error" *ngIf="isInvalid('password')">Password must be at least 8 characters</span>
        </div>

        <div class="form-group" *ngIf="isEditing">
          <label for="password">New password <span class="optional">(optional)</span></label>
          <div class="input-wrap">
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="Leave blank to keep unchanged"
            />
            <button type="button" class="toggle-pwd" (click)="showPassword = !showPassword">
              <i class="ti" [ngClass]="showPassword ? 'ti-eye-off' : 'ti-eye'"></i>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="role">Role</label>
          <select
            id="role"
            formControlName="role"
            [class.invalid]="isInvalid('role')"
            (change)="onRoleChange()"
          >
            <option value="">Select a role</option>
            <option [value]="Role.ADMIN">ADMIN</option>
            <option [value]="Role.FINANCIAL_MANAGER">MANAGER</option>
            <option [value]="Role.FINANCIAL_ANALYST">FINANCIAL ANALYST</option>
          </select>
          <span class="field-error" *ngIf="isInvalid('role')">Role is required</span>
        </div>

      </div>

      <!-- ROLE INFO -->
      <div class="role-info" *ngIf="roleDescription">
        <i class="ti ti-info-circle"></i>
        <span>{{ roleDescription }}</span>
      </div>

      <!-- GLOBAL ERROR -->
      <div class="global-error" *ngIf="errorMessage">
        <i class="ti ti-alert-circle"></i>
        {{ errorMessage }}
      </div>

      <div class="form-footer">
        <a routerLink="/users" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary" [disabled]="loading">
          <i class="ti" [ngClass]="loading ? 'ti-loader' : (isEditing ? 'ti-check' : 'ti-plus')"></i>
          {{ loading ? 'Saving...' : (isEditing ? 'Save changes' : 'Create user') }}
        </button>
      </div>

    </form>
  </div>
</div>
