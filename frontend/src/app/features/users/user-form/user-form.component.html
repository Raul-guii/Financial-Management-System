<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">{{ isEditing ? 'Editar usuário' : 'Novo usuário' }}</h1>
      <p class="page-subtitle">{{ isEditing ? 'Atualize os dados do usuário' : 'Preencha os dados para criar um usuário' }}</p>
    </div>
    <a routerLink="/users" class="btn btn-secondary">
      <i class="ti ti-arrow-left"></i>
      Voltar
    </a>
  </div>

  <div class="form-card">
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-grid">

        <div class="form-group">
          <label for="name">Nome completo</label>
          <input
            id="name"
            type="text"
            formControlName="name"
            placeholder="Ex: Carlos Mendes"
            [class.invalid]="isInvalid('name')"
          />
          <span class="field-error" *ngIf="isInvalid('name')">Nome é obrigatório</span>
        </div>

        <div class="form-group">
          <label for="email">E-mail</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="usuario@empresa.com"
            [class.invalid]="isInvalid('email')"
          />
          <span class="field-error" *ngIf="isInvalid('email')">E-mail inválido</span>
        </div>

        <div class="form-group" *ngIf="!isEditing">
          <label for="password">Senha</label>
          <div class="input-wrap">
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="Mínimo 8 caracteres"
              [class.invalid]="isInvalid('password')"
            />
            <button type="button" class="toggle-pwd" (click)="showPassword = !showPassword">
              <i class="ti" [ngClass]="showPassword ? 'ti-eye-off' : 'ti-eye'"></i>
            </button>
          </div>
          <span class="field-error" *ngIf="isInvalid('password')">Senha deve ter no mínimo 8 caracteres</span>
        </div>

        <div class="form-group" *ngIf="isEditing">
          <label for="password">Nova senha <span class="optional">(opcional)</span></label>
          <div class="input-wrap">
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="Deixe em branco para não alterar"
            />
            <button type="button" class="toggle-pwd" (click)="showPassword = !showPassword">
              <i class="ti" [ngClass]="showPassword ? 'ti-eye-off' : 'ti-eye'"></i>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="role">Role</label>
          <select
            id="role"
            formControlName="role"
            [class.invalid]="isInvalid('role')"
            (change)="onRoleChange()"
          >
            <option value="">Selecione uma role</option>
            <option [value]="Role.ADMIN">ADMIN</option>
            <option [value]="Role.FINANCIAL_MANAGER">GESTOR</option>
            <option [value]="Role.FINANCIAL_ANALYST">ANALISTA FINANCEIRO</option>
          </select>
          <span class="field-error" *ngIf="isInvalid('role')">Role é obrigatória</span>
        </div>

      </div>

      <!-- ROLE INFO -->
      <div class="role-info" *ngIf="roleDescription">
        <i class="ti ti-info-circle"></i>
        <span>{{ roleDescription }}</span>
      </div>

      <!-- ERRO GLOBAL -->
      <div class="global-error" *ngIf="errorMessage">
        <i class="ti ti-alert-circle"></i>
        {{ errorMessage }}
      </div>

      <div class="form-footer">
        <a routerLink="/users" class="btn btn-secondary">Cancelar</a>
        <button type="submit" class="btn btn-primary" [disabled]="loading">
          <i class="ti" [ngClass]="loading ? 'ti-loader' : (isEditing ? 'ti-check' : 'ti-plus')"></i>
          {{ loading ? 'Salvando...' : (isEditing ? 'Salvar alterações' : 'Criar usuário') }}
        </button>
      </div>

    </form>
  </div>
</div>
