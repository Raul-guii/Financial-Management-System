<h2>{{ id ? 'Editar Usuário' : 'Novo Usuário' }}</h2>

<form [formGroup]="form" (ngSubmit)="submit()">

  <input placeholder="Nome" formControlName="name">

  <input placeholder="Email" formControlName="email">

  <input 
    *ngIf="!id" 
    placeholder="Senha" 
    type="password" 
    formControlName="password"
  >

  <select formControlName="role">
    <option value="">Selecione</option>
    <option value="ADMIN">ADMIN</option>
    <option value="FINANCIAL_MANAGER">FINANCIAL_MANAGER</option>
    <option value="FINANCIAL_ANALYST">FINANCIAL_ANALYST</option>
  </select>

  <div class="actions">
    <button type="submit">
      {{ id ? 'Atualizar' : 'Criar' }}
    </button>

    <button type="button" class="cancel" (click)="cancel()">
      Cancelar
    </button>
  </div>

</form>
