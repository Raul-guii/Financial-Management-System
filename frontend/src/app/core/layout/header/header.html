<header class="header">
  <div class="left">
    <span class="page-name">{{ getPageTitle() }}</span>
  </div>

  <div class="right">
    <!-- SINO DE NOTIFICAÇÕES -->
    <div class="notif-wrap" (clickOutside)="closeNotifications()">
      <button class="notif-btn" (click)="toggleNotifications()">
        <i class="ti ti-bell"></i>
        <span class="notif-badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
      </button>

      <!-- DROPDOWN -->
      <div class="notif-dropdown" *ngIf="showNotifications">
        <div class="notif-header">
          <span class="notif-title">Notificações</span>
          <span class="notif-count" *ngIf="unreadCount > 0">{{ unreadCount }} não lida{{ unreadCount !== 1 ? 's' : '' }}</span>
        </div>

        <div class="notif-list" *ngIf="notifications.length > 0">
            <div
              class="notif-item"
              *ngFor="let n of notifications"
              [class.unread]="!n.isRead"
              (click)="openNotification(n)">
            <div class="notif-icon" [ngClass]="getNotifIconClass(n.type)">
              <i class="ti" [ngClass]="getNotifIcon(n.type)"></i>
            </div>
            <div class="notif-content">
              <div class="notif-item-title">{{ n.title }}</div>
              <div class="notif-item-message">{{ n.message }}</div>
              <div class="notif-item-time">{{ n.createdAt | date:'dd/MM HH:mm' }}</div>
            </div>
            <div class="notif-unread-dot" *ngIf="!n.isRead"></div>
          </div>
        </div>

        <div class="notif-empty" *ngIf="notifications.length === 0">
          <i class="ti ti-bell-off"></i>
          <span>Nenhuma notificação</span>
        </div>
      </div>
    </div>

    <!-- USUÁRIO -->
    <div class="user-info">
      <div class="user-avatar">{{ getUserInitial() }}</div>
      <div class="user-details">
        <span class="user-name">{{ getUserName() }}</span>
        <span class="user-role">{{ getUserRole() }}</span>
      </div>
    </div>

    <button class="btn-logout" (click)="logout()" title="Sair">
      <i class="ti ti-logout"></i>
    </button>
  </div>
</header>
